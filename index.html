<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CYBERCOUNTDOWN</title>

<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --accent: #e94560;
  --accent-dim: #b23a50;
  --accent-faint: #2c2c44;
  --text: #f0f0f0;
  --border: rgba(233,69,96,0.25);
  --font: 'Roboto Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow-x: hidden;
}

#matrix-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  opacity: 0.1;
  pointer-events: none;
}

/* ── Page Layout ── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

.header { text-align: center; margin-bottom: 2rem; }

.header .stamp {
  display: inline-block;
  border: 2px solid var(--accent);
  color: var(--accent);
  font-size: clamp(0.6rem, 1.5vw, 0.8rem);
  letter-spacing: 0.25em;
  padding: 3px 10px;
  margin-bottom: 1rem;
  transform: rotate(-2deg);
  opacity: 0.8;
}

.header h1 {
  font-size: clamp(1.5rem, 5vw, 3rem);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  text-shadow: 0 0 12px rgba(233,69,96,0.6);
  margin-bottom: 0.5rem;
}

.header .subtitle {
  font-size: clamp(0.65rem, 1.8vw, 0.9rem);
  color: var(--accent-dim);
  letter-spacing: 0.12em;
}

/* ── Countdown ── */
.countdown {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 2rem;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  min-width: 70px;
}

.unit-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-faint);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  border-radius: 8px;
}

.unit-number {
  font-size: clamp(2rem, 8vw, 4rem);
  font-weight: bold;
  color: var(--accent);
  text-shadow: 0 0 16px rgba(233,69,96,0.45);
  line-height: 1;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

.unit-number.flip {
  transform: scaleY(0.7);
  opacity: 0.3;
}

.unit-label {
  font-size: clamp(0.5rem, 1.3vw, 0.7rem);
  letter-spacing: 0.18em;
  color: var(--accent-dim);
  text-transform: uppercase;
}

.sep {
  font-size: clamp(1.5rem, 6vw, 3rem);
  color: var(--accent-dim);
  padding-top: 14px;
  line-height: 1;
  user-select: none;
  animation: blink 1.5s step-start infinite;
}

@keyframes blink { 0%,100% {opacity:1} 50% {opacity:0} }

/* ── Progress ── */
.progress-section {
  width: min(600px, 90vw);
  margin-bottom: 2rem;
}

.progress-track {
  width: 100%;
  height: 6px;
  background: var(--accent-faint);
  border: 1px solid var(--border);
  overflow: hidden;
  border-radius: 4px;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  box-shadow: 0 0 8px rgba(233,69,96,0.5);
  width: 0%;
  transition: width 1s linear;
}

.status {
  font-size: clamp(0.5rem, 1.3vw, 0.7rem);
  color: var(--accent-dim);
  text-align: center;
  margin-top: 0.5rem;
}

.cursor {
  display: inline-block;
  width: 0.55em;
  height: 1.1em;
  background: var(--accent);
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: blink 1s step-start infinite;
}

.expired-msg {
  display: none;
  text-align: center;
  font-size: clamp(1rem, 4vw, 1.8rem);
  letter-spacing: 0.2em;
  color: var(--accent);
  text-shadow: 0 0 24px rgba(233,69,96,0.6);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<main class="page">
<header class="header">
  <div class="stamp">CYBER OPS</div>
  <h1>COUNTDOWN TIMER<span class="cursor"></span></h1>
  <p class="subtitle">TIME UNTIL EVENT:</p>
</header>

<div class="countdown" id="countdown">
  <div class="unit">
    <div class="unit-box"><span class="unit-number" id="cd-days">00</span></div>
    <span class="unit-label">DAYS</span>
  </div>
  <span class="sep">:</span>
  <div class="unit">
    <div class="unit-box"><span class="unit-number" id="cd-hours">00</span></div>
    <span class="unit-label">HOURS</span>
  </div>
  <span class="sep">:</span>
  <div class="unit">
    <div class="unit-box"><span class="unit-number" id="cd-mins">00</span></div>
    <span class="unit-label">MINUTES</span>
  </div>
  <span class="sep">:</span>
  <div class="unit">
    <div class="unit-box"><span class="unit-number" id="cd-secs">00</span></div>
    <span class="unit-label">SECONDS</span>
  </div>
</div>

<div class="expired-msg" id="expired-msg">
  [ EVENT STARTED — ACCESS ACTIVE ]
</div>

<div class="progress-section">
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <p class="status" id="status-line">
    <span class="tag">[SYS]</span> COUNTDOWN RUNNING
  </p>
</div>
</main>

<script>
// Keep all your previous countdown logic and matrix background exactly the same
</script>
</body>
</html>
