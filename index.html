<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CYBERCOUNTDOWN</title>

<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --accent: #e94560;
  --accent-dim: #b23a50;
  --accent-faint: #2c2c44;
  --text: #f0f0f0;
  --border: rgba(233,69,96,0.25);
  --font: 'Roboto Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow-x: hidden;
}

#matrix-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  opacity: 0.1;
  pointer-events: none;
}

/* ── Page Layout ── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}

.header { text-align: center; margin-bottom: 2rem; }

.header .stamp {
  display: inline-block;
  border: 2px solid var(--accent);
  color: var(--accent);
  font-size: clamp(0.6rem, 1.5vw, 0.8rem);
  letter-spacing: 0.25em;
  padding: 3px 10px;
  margin-bottom: 1rem;
  transform: rotate(-2deg);
  opacity: 0.8;
}

.header h1 {
  font-size: clamp(1.5rem, 5vw, 3rem);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  text-shadow: 0 0 12px rgba(233,69,96,0.6);
  margin-bottom: 0.5rem;
}

.header .subtitle {
  font-size: clamp(0.65rem, 1.8vw, 0.9rem);
  color: var(--accent-dim);
  letter-spacing: 0.12em;
}

/* ── Countdown ── */
.countdown {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 2rem;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4rem;
  min-width: 70px;
}

.unit-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-faint);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  border-radius: 8px;
}

.unit-number {
  font-size: clamp(2rem, 8vw, 4rem);
  font-weight: bold;
  color: var(--accent);
  text-shadow: 0 0 16px rgba(233,69,96,0.45);
  line-height: 1;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

.unit-number.flip {
  transform: scaleY(0.7);
  opacity: 0.3;
}

.unit-label {
  font-size: clamp(0.5rem, 1.3vw, 0.7rem);
  letter-spacing: 0.18em;
  color: var(--accent-dim);
  text-transform: uppercase;
}

.sep {
  font-size: clamp(1.5rem, 6vw, 3rem);
  color: var(--accent-dim);
  padding-top: 14px;
  line-height: 1;
  user-select: none;
  animation: blink 1.5s step-start infinite;
}

@keyframes blink { 0%,100% {opacity:1} 50% {opacity:0} }

/* ── Progress ── */
.progress-section {
  width: min(600px, 90vw);
  margin-bottom: 2rem;
}

.progress-track {
  width: 100%;
  height: 6px;
  background: var(--accent-faint);
  border: 1px solid var(--border);
  overflow: hidden;
  border-radius: 4px;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  box-shadow: 0 0 8px rgba(233,69,96,0.5);
  width: 0%;
  transition: width 1s linear;
}

.status {
  font-size: clamp(0.5rem, 1.3vw, 0.7rem);
  color: var(--accent-dim);
  text-align: center;
  margin-top: 0.5rem;
}

.cursor {
  display: inline-block;
  width: 0.55em;
  height: 1.1em;
  background: var(--accent);
  vertical-align: text-bottom;
  margin-left: 2px;
  animation: blink 1s step-start infinite;
}

.expired-msg {
  display: none;
  text-align: center;
  font-size: clamp(1rem, 4vw, 1.8rem);
  letter-spacing: 0.2em;
  color: var(--accent);
  text-shadow: 0 0 24px rgba(233,69,96,0.6);
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<main class="page">
<header class="header">
  <div class="stamp">CYBER OPS</div>
  <h1>COUNTDOWN TIMER<span class="cursor"></span></h1>
  <p class="subtitle">TIME UNTIL EVENT:</p>
</header>

<div class="countdown" id="countdown">
  <div class="unit">
    <div class="unit-box"><span class="unit-number" id="cd-days">00</span></div>
    <span class="unit-label">DAYS</span>
  </div>
  <span class="sep">:</span>
  <div class="unit">
    <div class="unit-box"><span class="unit-number" id="cd-hours">00</span></div>
    <span class="unit-label">HOURS</span>
  </div>
  <span class="sep">:</span>
  <div class="unit">
    <div class="unit-box"><span class="unit-number" id="cd-mins">00</span></div>
    <span class="unit-label">MINUTES</span>
  </div>
  <span class="sep">:</span>
  <div class="unit">
    <div class="unit-box"><span class="unit-number" id="cd-secs">00</span></div>
    <span class="unit-label">SECONDS</span>
  </div>
</div>

<div class="expired-msg" id="expired-msg">
  [ EVENT STARTED — ACCESS ACTIVE ]
</div>

<div class="progress-section">
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <p class="status" id="status-line">
    <span class="tag">[SYS]</span> COUNTDOWN RUNNING
  </p>
</div>
</main>

<script>
const DURATION_DAYS = 30; // 30-day countdown
const STORAGE_KEY = 'cyber_start_ts';

function getStartTime() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) { 
    const ts = parseInt(stored, 10); 
    if (!isNaN(ts)) return ts; 
  }
  const now = Date.now();
  localStorage.setItem(STORAGE_KEY, now.toString());
  return now;
}

const START_TS = getStartTime();
const TOTAL_MS = DURATION_DAYS * 24 * 60 * 60 * 1000;
const END_TS = START_TS + TOTAL_MS;

const elDays = document.getElementById('cd-days');
const elHours = document.getElementById('cd-hours');
const elMins = document.getElementById('cd-mins');
const elSecs = document.getElementById('cd-secs');
const elFill = document.getElementById('progress-fill');
const elStatus = document.getElementById('status-line');
const elExpired = document.getElementById('expired-msg');
const elCountdown = document.getElementById('countdown');

function pad(n){ return String(Math.floor(n)).padStart(2,'0'); }
function animateFlip(el,value){
  const newVal = pad(value);
  if(el.textContent !== newVal){
    el.classList.add('flip');
    setTimeout(()=>{ el.textContent=newVal; el.classList.remove('flip'); },150);
  }
}

function tick(){
  const now = Date.now();
  const remaining = END_TS - now;
  const elapsed = now - START_TS;

  if(remaining <= 0){
    elCountdown.style.display='none';
    elExpired.style.display='block';
    elFill.style.width='100%';
    elStatus.innerHTML='<span class="tag">[SYS]</span> EVENT ACTIVE';
    return;
  }

  const totalSecs = Math.floor(remaining/1000);
  const days = Math.floor(totalSecs/86400);
  const hours = Math.floor((totalSecs%86400)/3600);
  const mins = Math.floor((totalSecs%3600)/60);
  const secs = totalSecs%60;

  animateFlip(elDays,days);
  animateFlip(elHours,hours);
  animateFlip(elMins,mins);
  animateFlip(elSecs,secs);

  const pctElapsed = Math.min((elapsed/TOTAL_MS)*100,100);
  elFill.style.width = pctElapsed.toFixed(2)+'%';
}

tick();
const interval = setInterval(()=>{ tick(); if(Date.now()>=END_TS) clearInterval(interval); },1000);

/* ── Matrix Background ── */
(function matrixRain(){
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  const CHARS = '01@#$%^&*()_+=-<>ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const COL_W = 16;
  let cols, drops;

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.ceil(canvas.width/COL_W);
    drops = new Array(cols).fill(0).map(()=>Math.random()*-50);
  }
  window.addEventListener('resize',resize);
  resize();

  function draw(){
    ctx.fillStyle='rgba(26,26,46,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.font='13px monospace';
    for(let i=0;i<cols;i++){
      const char = CHARS[Math.floor(Math.random()*CHARS.length)];
      const x=i*COL_W;
      const y=drops[i]*COL_W;
      ctx.fillStyle=(Math.random()>0.92)?'#ffffff':'#e94560';
      ctx.fillText(char,x,y);
      if(y>canvas.height && Math.random()>0.975) drops[i]=0;
      drops[i]+=0.5;
    }
  }
  setInterval(draw,45);
})();
</script>

</body>
</html>
